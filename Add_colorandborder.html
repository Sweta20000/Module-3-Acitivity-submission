<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Container Fluid with Colors & Borders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Full-width header with background color -->
  <div class="container-fluid bg-primary text-white text-center p-5 border-bottom border-dark">
    <h1>Sweta Singh</h1>
    <p class="lead">My Full-Width Bootstrap Section</p>
  </div>

  <!-- Grid inside container-fluid -->
  <div class="container-fluid mt-4">
    <div class="row text-center">
      <div class="col-md-3 bg-light p-3 border border-primary">
        <h2>HTML <small class="text-muted">Structure</small></h2>
      </div>
      <div class="col-md-3 bg-light p-3 border border-success">
        <h2>CSS <small class="text-muted">Styling</small></h2>
      </div>
      <div class="col-md-3 bg-light p-3 border border-danger">
        <h2>Grid <small class="text-muted">Responsive</small></h2>
      </div>
      <div class="col-md-3 bg-light p-3 border border-warning">
        <h2>Portfolio <small class="text-muted">Sweta Singh</small></h2>
      </div>
    </div>
  </div>

</body>
</html>
