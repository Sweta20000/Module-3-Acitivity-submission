<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Grid Sweta Singh</title>
  <style>
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr; /* 3 equal columns */
      gap: 10px; /* space between items */
      background-color: #f0f0f0;
      padding: 10px;
    }

    .grid-item {
      background-color: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 18px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>My First Grid Layout</h1>
  <div class="grid-container">
    <div class="grid-item">Sweta</div>
    <div class="grid-item">Singh</div>
    <div class="grid-item">Sweta</div>
    <div class="grid-item">Singh</div>
    <div class="grid-item">Sweta</div>
    <div class="grid-item">Singh</div>
  </div>
</body>
</html>
