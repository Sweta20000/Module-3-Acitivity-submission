<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Scrollspy Example</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .scroll-container {
      position: relative;
      height: 300px;
      overflow-x: auto; 
      overflow-y: hidden;
      white-space: nowrap;
    }
    .section {
      display: inline-block;
      width: 100%;
      height: 100%;
      padding: 50px;
    }
  </style>
</head>
<body>

  <nav id="navbar-example" class="navbar navbar-light bg-light px-3">
    <ul class="nav nav-pills">
      <li class="nav-item"><a class="nav-link" href="#section1">HTML</a></li>
      <li class="nav-item"><a class="nav-link" href="#section2">CSS</a></li>
      <li class="nav-item"><a class="nav-link" href="#section3">Bootstrap</a></li>
      <li class="nav-item"><a class="nav-link" href="#section4">Portfolio</a></li>
    </ul>
  </nav>

  <div data-bs-spy="scroll" data-bs-target="#navbar-example" data-bs-offset="0" tabindex="0" class="scroll-container">
    <div id="section1" class="section bg-primary text-white">HTML Section</div>
    <div id="section2" class="section bg-success text-white">CSS Section</div>
    <div id="section3" class="section bg-warning text-dark">Bootstrap Section</div>
    <div id="section4" class="section bg-danger text-white">Portfolio Section</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
