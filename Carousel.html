<html>
    <div id="portfolioCarousel" class="carousel slide" data-bs-ride="carousel">
  <!-- Indicators -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#portfolioCarousel" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#portfolioCarousel" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#portfolioCarousel" data-bs-slide-to="2"></button>
  </div>

  <!-- Carousel items -->
  <div class="carousel-inner">

      <img src="https://via.placeholder.com/800x400" class="d-block w-100" alt="Project 1">
      <div class="carousel-caption d-none d-md-block">
        <h5>Project 1</h5>
        <p>Responsive HTML & CSS Layout</p>
      </div>
    </div>
    <div class="carousel-item">
      <img src="https://via.placeholder.com/800x400" class="d-block w-100" alt="Project 2">

      </div>
    </div>
    <div class="carousel-item">
      <img src="https://via.placeholder.com/800x400" class="d-block w-100" alt="Project 3">
      <div class="carousel-caption d-none d-md-block">
        <h5>Project 3</h5>
        <p>Animations & Effects</p>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <button class="carousel-control-prev" type="button" data-bs-target="#portfolioCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#portfolioCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>
</html>
